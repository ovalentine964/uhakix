name: UHAKIX Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---- Tests ----
  smart-contract-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: blockchain
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: blockchain/package.json
      - run: npm ci
      - run: npx hardhat compile
      - run: npx hardhat test

  # ---- Deploy to GitHub Pages ----
  deploy-pages:
    needs: [smart-contract-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deployment
        uses: actions/deploy-pages@v4
